<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LegalGraph — Экспертная валидация{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    {% if expert %}
    <nav class="topbar">
        <div class="brand"><a href="/">LegalGraph • Экспертная валидация</a></div>
        <div class="links">
            <a href="/">Дашборд</a>
            {% if expert.is_admin %}<a href="/admin">Админка</a>{% endif %}
            <span class="user">{{ expert.full_name or expert.username }}</span>
            <a href="/logout" class="logout">Выйти</a>
        </div>
    </nav>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
